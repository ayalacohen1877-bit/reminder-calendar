<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reminder Calendar</title>
    <script src="https://unpkg.com/vue@3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            padding: 15px;
            font-size: 13px;
        }

        /* הגבלה לרוחב קטן מאוד */
        .app-wrapper {
            max-width: 500px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
        }

        /* אייקון מינימליסטי */
        .icon-calendar {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .btn-toggle {
            background: none;
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }

        .calendar-card {
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 15px;
        }

        .calendar-nav {
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .weekday-label {
            padding: 5px;
            text-align: center;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 10px;
            border-bottom: 1px solid var(--border);
        }

        .day {
            min-height: 45px;
            padding: 3px;
            border-left: 1px solid #f1f5f9;
            border-bottom: 1px solid #f1f5f9;
            position: relative;
            cursor: pointer;
        }

        .day:hover { background: #f8fafc; }
        .day.today { background: #eef2ff; }
        .day.today .day-number { color: var(--primary); font-weight: 800; }

        .day-number { font-size: 10px; color: var(--text-muted); }

        /* נקודות קטנות לתזכורות בלוח */
        .dot-container {
            display: flex;
            gap: 2px;
            justify-content: center;
            margin-top: 2px;
        }
        .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
        }

        /* רשימת תזכורות (חדש) */
        .reminders-list-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            box-shadow: var(--shadow);
        }

        .list-header {
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .reminder-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .reminder-info { display: flex; flex-direction: column; }
        .reminder-text { font-weight: 600; }
        .reminder-meta { font-size: 10px; color: var(--text-muted); }

        .badge {
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 9px;
            background: #f1f5f9;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-body {
            background: white; width: 280px; padding: 15px; border-radius: 12px;
        }
        input, select {
            width: 100%; box-sizing: border-box; padding: 6px; margin: 4px 0 10px;
            border: 1px solid var(--border); border-radius: 6px;
        }
        .btn-save {
            background: var(--primary); color: white; border: none;
            width: 100%; padding: 8px; border-radius: 6px; cursor: pointer;
        }

        .slide-enter-active, .slide-leave-active { transition: 0.3s ease; max-height: 400px; }
        .slide-enter-from, .slide-leave-to { max-height: 0; opacity: 0; }
    </style>
</head>
<body>

<div id="app" class="app-wrapper">

    <header class="dashboard-header">
        <div class="brand">
            <svg class="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>יומן תזכורות</span>
        </div>
        <button class="btn-toggle" @click="showCalendar = !showCalendar">
            {{ showCalendar ? 'צמצם' : 'לוח שנה' }}
        </button>
    </header>

    <transition name="slide">
        <div class="calendar-card" v-show="showCalendar">
            <div class="calendar-nav">
                <button @click="prevMonth" style="border:none; background:none; cursor:pointer">‹</button>
                <strong>{{monthName}}</strong>
                <button @click="nextMonth" style="border:none; background:none; cursor:pointer">›</button>
            </div>
            <div class="calendar-grid">
                <div class="weekday-label" v-for="d in ['א','ב','ג','ד','ה','ו','ש']">{{d}}</div>
                <div class="day empty" v-for="b in blankDays"></div>
                <div v-for="d in days" :key="d.date" class="day" :class="{today: d.isToday}" @click="openModal(d)">
                    <span class="day-number">{{d.day}}</span>
                    <div class="dot-container">
                        <div class="dot" v-for="r in getFiltered(d.date).slice(0,3)"></div>
                    </div>
                </div>
            </div>
        </div>
    </transition>

    <div class="reminders-list-card">
        <div class="list-header">
            <span>תזכורות מתוזמנות</span>
            <span class="badge">{{ reminders.length }} פריטים</span>
        </div>
        
        <div v-if="reminders.length === 0" style="text-align:center; color:var(--text-muted); padding:10px;">
            אין תזכורות כרגע
        </div>

        <div v-for="r in reminders" :key="r.id" class="reminder-item">
            <div class="reminder-info">
                <span class="reminder-text">{{r.text}}</span>
                <span class="reminder-meta">{{r.date}} • נמען: {{r.target === 'me' ? 'אני' : r.target}}</span>
            </div>
            <button @click="remove(r.id)" style="border:none; background:none; color:#ef4444; cursor:pointer; font-size:14px;">&times;</button>
        </div>
    </div>

    <div class="modal-overlay" v-if="modal" @click.self="modal=false">
        <div class="modal-body">
            <h4 style="margin:0 0 10px 0">הוספה ל-{{selectedDate}}</h4>
            
            <label style="font-size:11px">מה התזכורת?</label>
            <input v-model="form.text" placeholder="לדוגמה: ישיבת צוות" />

            <label style="font-size:11px">עבור מי?</label>
            <select v-model="form.target">
                <option value="me">עבורי</option>
                <option value="all">כל העובדים</option>
                <option v-for="e in employees" :value="e.name">{{e.name}}</option>
            </select>

            <button class="btn-save" @click="save">שמור תזכורת</button>
        </div>
    </div>

</div>

<script>
const {createApp}=Vue;

createApp({
    data(){
        return {
            showCalendar: true,
            modal: false,
            selectedDate: "",
            reminders: JSON.parse(localStorage.getItem("data_v3") || "[]"),
            employees: [{name:"נועה"}, {name:"דן"}, {name:"יעל"}],
            form: { text: "", target: "me" },
            current: new Date()
        }
    },
    computed: {
        monthName() {
            return this.current.toLocaleString("he-IL", {month:"long", year:"numeric"});
        },
        blankDays() {
            return new Date(this.current.getFullYear(), this.current.getMonth(), 1).getDay();
        },
        days() {
            let y = this.current.getFullYear(), m = this.current.getMonth();
            let arr = [], today = new Date().toISOString().split("T")[0];
            let lastDay = new Date(y, m+1, 0).getDate();
            for(let i=1; i<=lastDay; i++){
                let d = new Date(y, m, i).toLocaleDateString('en-CA');
                arr.push({day:i, date:d, isToday: d === today});
            }
            return arr;
        }
    },
    methods: {
        prevMonth() { this.current = new Date(this.current.setMonth(this.current.getMonth()-1)); },
        nextMonth() { this.current = new Date(this.current.setMonth(this.current.getMonth()+1)); },
        openModal(d) {
            this.selectedDate = d.date;
            this.form = { text: "", target: "me" };
            this.modal = true;
        },
        save() {
            if(!this.form.text) return;
            this.reminders.push({ id: Date.now(), ...this.form, date: this.selectedDate });
            this.saveData();
            this.modal = false;
        },
        remove(id) {
            this.reminders = this.reminders.filter(r => r.id !== id);
            this.saveData();
        },
        saveData() {
            localStorage.setItem("data_v3", JSON.stringify(this.reminders));
        },
        getFiltered(date) {
            return this.reminders.filter(r => r.date === date);
        }
    }
}).mount("#app")
</script>

</body>
</html>
